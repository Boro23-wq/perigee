<!--
  Supabase → Authentication → Email Templates → Reset Password
  Paste the body below into the "Message body" field as-is.
  Uses Supabase's built-in template variables: {{ .ConfirmationURL }}, {{ .Email }}
-->
<div style="background-color:#fafafa; padding:40px 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:420px; margin:0 auto;">
    <tr>
      <td align="center" style="padding-bottom:28px;">
        <img src="https://perigee.fit/mark.png" alt="Perigee" width="40" height="35" style="display:block;" />
      </td>
    </tr>
    <tr>
      <td style="background-color:#ffffff; border:1px solid #e4e4e7; border-radius:16px; padding:32px 28px; box-shadow:0 1px 3px rgba(13,13,15,0.04);">
        <h1 style="margin:0 0 8px; color:#0d0d0f; font-size:20px; font-weight:600; letter-spacing:-0.01em; text-align:center;">
          Reset your password
        </h1>
        <p style="margin:0 0 24px; color:#6b7076; font-size:14px; line-height:1.6; text-align:center;">
          Click below to choose a new password for your Perigee account.
        </p>
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block; background-color:#0068ff; color:#ffffff; font-size:14px; font-weight:600; text-decoration:none; padding:12px 28px; border-radius:8px;">
                Reset password
              </a>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0; color:#9a9ea3; font-size:12px; line-height:1.6; text-align:center;">
          This link expires in 60 minutes. If you didn't request this, you can ignore this email; your password won't change.
        </p>
      </td>
    </tr>
    <tr>
      <td align="center" style="padding-top:24px;">
        <p style="margin:0; color:#9a9ea3; font-size:12px;">
          Sent to {{ .Email }} &middot; Perigee
        </p>
      </td>
    </tr>
  </table>
</div>
